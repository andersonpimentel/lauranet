<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futuro site da Laura</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Poppins", Arial, sans-serif;
      background: linear-gradient(135deg, #ffb6d9, #ffc8e5, #ffd8ef);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Bolinhas decorativas */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      animation: float 8s infinite ease-in-out;
      backdrop-filter: blur(3px);
    }

    .bubble:nth-child(1) {
      width: 180px;
      height: 180px;
      top: 8%;
      left: 10%;
      animation-delay: 0s;
    }

    .bubble:nth-child(2) {
      width: 120px;
      height: 120px;
      bottom: 10%;
      right: 12%;
      animation-delay: 2s;
    }

    .bubble:nth-child(3) {
      width: 70px;
      height: 70px;
      top: 20%;
      right: 20%;
      animation-delay: 4s;
    }

    .bubble:nth-child(4) {
      width: 90px;
      height: 90px;
      bottom: 18%;
      left: 18%;
      animation-delay: 1s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-18px);
      }
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(14px);
      padding: 50px 40px;
      border-radius: 28px;
      text-align: center;
      width: 90%;
      max-width: 620px;
      box-shadow:
        0 10px 35px rgba(255, 105, 180, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .emoji {
      font-size: 72px;
      margin-bottom: 18px;
      animation: bounce 2.5s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-size: 3rem;
      color: #ffffff;
      text-shadow: 0 3px 10px rgba(255, 105, 180, 0.45);
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      color: #8a2c5f;
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 28px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.35);
      padding: 16px 20px;
      border-radius: 18px;
      text-shadow: 0 1px 1px rgba(255,255,255,0.35);
    }

    .badge {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: white;
      color: #ff4fa0;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.25);
    }

    footer {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      z-index: 2;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 1rem;
      }

      .card {
        padding: 40px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <main class="card">
    <div class="emoji">🎀</div>

    <h1>Futuro site da Laura</h1>

    <p>
      Um cantinho cheio de criatividade, diversão, cores e coisas incríveis
      está sendo preparado com muito carinho ✨
      Hoje estou treinando piano! 🎹 
    </p>

    <div class="badge">
      Em construção 💖
    </div>
  </main>

  <footer>
    © 2026 • Laura
  </footer>

</body>
</html>
